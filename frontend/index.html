<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #2c3e50; text-align: center; }
        .form-group { margin: 20px 0; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        textarea {
            width: 100%; height: 150px;
            padding: 10px; border-radius: 5px;
            border: 1px solid #ccc;
        }
        input[type="file"] { padding: 10px; }
        button {
            background: #2c3e50; color: white;
            padding: 12px 30px; border: none;
            border-radius: 5px; cursor: pointer;
            font-size: 16px; width: 100%;
        }
        button:hover { background: #34495e; }
        #results { margin-top: 30px; }
    </style>
</head>
<body>
    <h1>🤖 AI Resume Screener</h1>

    <div class="form-group">
        <label>Job Description:</label>
        <textarea id="jobDesc" 
            placeholder="Paste the job description here..."></textarea>
    </div>

    <div class="form-group">
        <label>Upload Resumes (PDF):</label>
        <input type="file" id="resumes" multiple accept=".pdf">
    </div>

    <button onclick="screenResumes()">Screen Resumes</button>

    <div id="results"></div>

    <script>
        async function screenResumes() {
            const jobDesc = document.getElementById('jobDesc').value;
            const resumes = document.getElementById('resumes').files;

            if (!jobDesc || resumes.length === 0) {
                alert('Please fill in the job description and upload at least one resume!');
                return;
            }

            // Build the form data to send to backend
            const formData = new FormData();
            formData.append('job_description', jobDesc);
            for (let resume of resumes) {
                formData.append('resumes', resume);
            }

            document.getElementById('results').innerHTML = '<p>⏳ Screening resumes...</p>';

            // Send to backend
            const response = await fetch('http://127.0.0.1:8000/screen', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            document.getElementById('results').innerHTML = 
                '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }
    </script>
</body>
</html>
